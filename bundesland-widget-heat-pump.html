<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bundesland-Vergleich - Wärmepumpe</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#EAEAEB;color:#0A0908;font-family:Roboto,system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.widget{padding:28px 24px 32px;max-width:1000px;margin:0 auto}
.widget__title{font-size:22px;font-weight:700;text-align:center;margin:0 0 28px;line-height:1.3;letter-spacing:-.005em}
.widget__grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 24px}
.tile{display:flex;align-items:center;justify-content:flex-start;gap:14px;padding:22px 28px;background:#fff;border:1px solid #0A0908;border-radius:6px;text-decoration:none;color:#0A0908;font-size:17px;font-weight:500;line-height:1.2;transition:border-color .12s cubic-bezier(.22,.61,.36,1),background .12s cubic-bezier(.22,.61,.36,1),transform .12s cubic-bezier(.22,.61,.36,1);-webkit-tap-highlight-color:transparent}
.tile:hover,.tile:focus-visible{background:#E6F5ED;border-color:#30AB66;outline:none}.tile:active{transform:translateY(1px)}
.tile__code{min-width:36px;font-size:17px;font-weight:700;color:#30AB66;letter-spacing:.01em}
.tile__name{font-weight:700}
@media (max-width:640px){.widget{padding:20px 14px 24px}.widget__title{font-size:18px;margin-bottom:20px}.widget__grid{grid-template-columns:1fr;gap:12px}.tile{padding:18px 20px;font-size:16px}}
@media (prefers-reduced-motion:reduce){.tile{transition:none}}
</style>
</head>
<body>
<section class="widget" aria-labelledby="wp-widget-title">
  <h2 class="widget__title" id="wp-widget-title">In welchem Bundesland leben Sie?</h2>
  <div class="widget__grid" role="list"></div>
  <noscript><ul style="list-style:none;padding:0;margin:0;display:grid;grid-template-columns:1fr 1fr;gap:12px"><li><a href="https://www.top10-anbieter.de/waermepumpe-desktop-2?bcid=3jf95jdleq&amp;publisher=Welt&amp;publisher-content=welt-waermepumpe-artikel&amp;utm_content=noscript" target="_blank" rel="noopener noreferrer" style="display:block;padding:18px;border:1px solid #0A0908;border-radius:6px;background:#fff;color:#0A0908;text-decoration:none">Bundesland wählen &rarr;</a></li></ul></noscript>
</section>
<script>
(function(){
  var desktop='https://www.top10-anbieter.de/waermepumpe-desktop-2?bcid=3jf95jdleq&publisher=Welt&publisher-content=welt-waermepumpe-artikel';
  var mobile='https://www.top10-anbieter.de/waermepumpe-mobile-2?bcid=3jf95jdleq&publisher=Welt&publisher-content=welt-waermepumpe-artikel';
  try{
    var q=new URL(location.href).searchParams,g=q.get('funnel'),d=q.get('funnelDesktop'),m=q.get('funnelMobile');
    if(g)desktop=mobile=g;
    if(d)desktop=d;
    if(m)mobile=m;
  }catch(e){}
  var PASS=['gclid','msclkid','matchtype','utm_source','utm_campaign','keyword','placement','device'];
  var passMap={};
  PASS.forEach(function(k){try{var v=q.get(k);if(v)passMap[k]=v;}catch(e){}});
  try{var rq=new URL(document.referrer).searchParams;PASS.forEach(function(k){if(!passMap[k]){var v=rq.get(k);if(v)passMap[k]=v;}});}catch(e){}
  var pass=Object.keys(passMap).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(passMap[k]);}).join('&');
  function isMobile(){
    try{
      var w=(window.top&&window.top.innerWidth)||window.innerWidth||0;
      if(w&&w<768)return true;
      if(w&&w>=768)return !!(window.matchMedia&&window.matchMedia('(pointer: coarse)').matches&&w<1024);
    }catch(e){}
    return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent||'');
  }
  var funnel=isMobile()?mobile:desktop;
  var states=[['BW','Baden-Württemberg'],['BY','Bayern'],['BE','Berlin'],['BB','Brandenburg'],['HB','Bremen'],['HH','Hamburg'],['HE','Hessen'],['MV','Mecklenburg-Vorpommern'],['NI','Niedersachsen'],['NW','Nordrhein-Westfalen'],['RP','Rheinland-Pfalz'],['SL','Saarland'],['ST','Sachsen-Anhalt'],['SN','Sachsen'],['SH','Schleswig-Holstein'],['TH','Thüringen']];
  function href(code){return funnel+'&utm_content='+encodeURIComponent(code)+'&bundesland='+encodeURIComponent(code)+(pass?'&'+pass:'')}
  function track(code,name){
    var payload={event:'wp_widget_state_click',widget:'bundesland_tiles',state_code:code,state_name:name};
    try{
      if(window.parent&&window.parent!==window)window.parent.postMessage({type:'wp_widget',payload:payload},'*');
      if(window.dataLayer&&typeof window.dataLayer.push==='function')window.dataLayer.push(payload);
    }catch(e){}
  }
  var grid=document.querySelector('.widget__grid');
  if(!grid)return;
  var frag=document.createDocumentFragment();
  states.forEach(function(s){
    var code=s[0],name=s[1],a=document.createElement('a'),codeEl=document.createElement('span'),nameEl=document.createElement('span');
    a.className='tile';
    a.href=href(code);
    a.target='_blank';
    a.rel='noopener noreferrer';
    a.setAttribute('role','listitem');
    a.setAttribute('aria-label',name);
    codeEl.className='tile__code';
    codeEl.textContent=code;
    nameEl.className='tile__name';
    nameEl.textContent=name;
    a.appendChild(codeEl);
    a.appendChild(nameEl);
    a.addEventListener('click',function(){track(code,name)},{passive:true});
    frag.appendChild(a);
  });
  grid.appendChild(frag);
  var lastH=0;
  function postHeight(){
    try{
      var h=document.documentElement.scrollHeight;
      if(h!==lastH&&window.parent&&window.parent!==window){lastH=h;window.parent.postMessage({type:'wp_widget_resize',height:h},'*')}
    }catch(e){}
  }
  function schedule(){window.requestAnimationFrame(postHeight)}
  window.addEventListener('load',schedule);
  window.addEventListener('resize',schedule);
  if(window.ResizeObserver)new ResizeObserver(schedule).observe(document.documentElement);
  schedule();
})();
</script>
</body>
</html>
