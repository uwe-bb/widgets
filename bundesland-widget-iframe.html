<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bundesland-Vergleich – Solaranlage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #EAEAEB;
    font-family: 'Roboto', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .bb-widget {
    background: #EAEAEB;
    padding: 28px 24px 32px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .bb-widget__heading {
    font-size: 22px;
    font-weight: 700;
    color: #0A0908;
    text-align: center;
    margin-bottom: 28px;
    letter-spacing: -0.005em;
  }

  .bb-widget__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 24px;
  }

  .bb-tile {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 14px;
    background: #ffffff;
    border: 1px solid #0A0908;
    border-radius: 6px;
    padding: 22px 28px;
    text-decoration: none;
    cursor: pointer;
    font-size: 17px;
    font-weight: 500;
    line-height: 1.2;
    transition: border-color .12s cubic-bezier(.22,.61,.36,1), background .12s cubic-bezier(.22,.61,.36,1), transform .12s cubic-bezier(.22,.61,.36,1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .bb-tile:hover {
    background: #E6F5ED;
    border-color: #30AB66;
  }

  .bb-tile:active {
    transform: translateY(1px);
  }

  .bb-tile__abbr {
    font-size: 17px;
    font-weight: 700;
    color: #30AB66;
    letter-spacing: 0.01em;
    min-width: 36px;
    text-align: left;
  }

  .bb-tile__name {
    font-size: 17px;
    font-weight: 700;
    color: #0A0908;
    letter-spacing: -0.005em;
  }

  /* Mobile: single column */
  @media (max-width: 640px) {
    .bb-widget {
      padding: 20px 14px 24px;
    }

    .bb-widget__heading {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .bb-widget__grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .bb-tile {
      padding: 18px 20px;
      font-size: 16px;
    }

    .bb-tile__abbr {
      font-size: 16px;
    }

    .bb-tile__name {
      font-size: 16px;
    }
  }

  /* Focus ring for keyboard nav */
  .bb-tile:focus-visible {
    outline: 3px solid #30AB66;
    outline-offset: 2px;
  }
</style>
</head>
<body>

<div class="bb-widget" role="region" aria-label="Bundesland auswählen">
  <h2 class="bb-widget__heading">In welchem Bundesland leben Sie?</h2>
  <div class="bb-widget__grid" id="bb-grid"></div>
</div>

<script>
(function() {
  // Funnel URLs — desktop vs mobile. The widget auto-picks based on viewport width.
  // To change the mobile funnel URL later, edit FUNNEL_MOBILE_BASE below.
  var FUNNEL_DESKTOP_BASE = 'https://www.top10-anbieter.de/solar-desktop3';
  var FUNNEL_MOBILE_BASE  = 'https://www.top10-anbieter.de/solar-mobile3';
  var FUNNEL_HASH = '#immobilie';
  var UTM = 'utm_source=ad20&utm_medium=advertorial&utm_campaign=bundesland-widget';
  var MOBILE_MQ = '(max-width: 640px)';

  // Order matches the reference Unbounce page: left column then right column, alphabetical
  var STATES = [
    { abbr: 'BW', name: 'Baden-Württemberg' },
    { abbr: 'BY', name: 'Bayern' },
    { abbr: 'BE', name: 'Berlin' },
    { abbr: 'BB', name: 'Brandenburg' },
    { abbr: 'HB', name: 'Bremen' },
    { abbr: 'HH', name: 'Hamburg' },
    { abbr: 'HE', name: 'Hessen' },
    { abbr: 'MV', name: 'Mecklenburg-Vorpommern' },
    { abbr: 'NI', name: 'Niedersachsen' },
    { abbr: 'NW', name: 'Nordrhein-Westfalen' },
    { abbr: 'RP', name: 'Rheinland-Pfalz' },
    { abbr: 'SL', name: 'Saarland' },
    { abbr: 'ST', name: 'Sachsen-Anhalt' },
    { abbr: 'SN', name: 'Sachsen' },
    { abbr: 'SH', name: 'Schleswig-Holstein' },
    { abbr: 'TH', name: 'Thüringen' }
  ];

  function isMobile() {
    return window.matchMedia(MOBILE_MQ).matches;
  }

  function buildUrl(abbr) {
    var base = isMobile() ? FUNNEL_MOBILE_BASE : FUNNEL_DESKTOP_BASE;
    return base + '?' + UTM + '&utm_content=' + abbr + FUNNEL_HASH;
  }

  var grid = document.getElementById('bb-grid');
  var frag = document.createDocumentFragment();

  STATES.forEach(function(s) {
    var a = document.createElement('a');
    a.className = 'bb-tile';
    a.dataset.abbr = s.abbr;
    a.href = buildUrl(s.abbr);
    a.target = '_top'; // Break out of iframe
    a.rel = 'noopener';
    a.setAttribute('aria-label', s.name);

    var abbr = document.createElement('span');
    abbr.className = 'bb-tile__abbr';
    abbr.textContent = s.abbr;

    var name = document.createElement('span');
    name.className = 'bb-tile__name';
    name.textContent = s.name;

    a.appendChild(abbr);
    a.appendChild(name);
    frag.appendChild(a);
  });

  grid.appendChild(frag);

  // Keep hrefs in sync with viewport so right-click "copy link" is always correct
  function refreshHrefs() {
    var tiles = document.querySelectorAll('.bb-tile');
    for (var i = 0; i < tiles.length; i++) {
      tiles[i].href = buildUrl(tiles[i].dataset.abbr);
    }
  }

  var mql = window.matchMedia(MOBILE_MQ);
  if (mql.addEventListener) {
    mql.addEventListener('change', refreshHrefs);
  } else if (mql.addListener) {
    mql.addListener(refreshHrefs); // Safari < 14 fallback
  }

  // Post height to parent so the iframe can auto-resize (parent must listen for wp_widget_resize)
  var lastH = 0;
  function postHeight() {
    try {
      var h = document.documentElement.scrollHeight;
      if (h !== lastH && window.parent !== window) {
        lastH = h;
        window.parent.postMessage({ type: 'wp_widget_resize', height: h }, '*');
      }
    } catch (e) {}
  }
  function schedulePost() { window.requestAnimationFrame(postHeight); }
  window.addEventListener('load', schedulePost);
  window.addEventListener('resize', schedulePost);
  if (window.ResizeObserver) new ResizeObserver(schedulePost).observe(document.documentElement);
  schedulePost();
})();
</script>

</body>
</html>
